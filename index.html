<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kingdom</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0a0a0a;
color:#ffd700;
}

/* container */
.app{
max-width:420px;
margin:auto;
padding:20px;
}

/* header */
.header{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#ffd700;
text-shadow:0 0 10px #d4af37;
}

/* card */
.card{
background:#111;
border-radius:20px;
padding:16px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(212,175,55,0.2);
}

/* row */
.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
}

/* switch */
.switch{
position:relative;
width:50px;
height:26px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
background:#333;
border-radius:30px;
width:100%;
height:100%;
transition:0.3s;
}

.slider:before{
content:"";
position:absolute;
width:20px;
height:20px;
left:3px;
top:3px;
background:#fff;
border-radius:50%;
transition:0.3s;
}

input:checked + .slider{
background:#ffd700;
box-shadow:0 0 12px #ffd700;
}

input:checked + .slider:before{
transform:translateX(24px);
}

/* dpi */
.title{
text-align:center;
margin-bottom:10px;
}

.range{
width:100%;
accent-color:#ffd700;
}

.value{
text-align:center;
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#ffd700;
}
</style>

</head>

<body>

<div class="app">

<div class="header">👑 Kingdom Panel</div>

<div class="card">

<div class="row">
<span>ดูดหัว 100%</span>
<label class="switch">
<input type="checkbox" onchange="save()">
<span class="slider"></span>
</label>
</div>

<div class="row">
<span>ดูดหัว 85%</span>
<label class="switch">
<input type="checkbox" onchange="save()">
<span class="slider"></span>
</label>
</div>

<div class="row">
<span>กันแบน 100%</span>
<label class="switch">
<input type="checkbox" onchange="save()">
<span class="slider"></span>
</label>
</div>

</div>

<div class="card">

<div class="title">DPI</div>
<input type="range" min="1" max="1000" value="500" class="range" oninput="dpi(this.value)">
<div class="value" id="dpiValue">500</div>

</div>

</div>

<script>

// DPI
function dpi(val){
document.getElementById("dpiValue").innerText=val;
localStorage.setItem("dpi",val);
}

// save toggle
function save(){
let arr=[];
document.querySelectorAll("input[type=checkbox]").forEach(c=>arr.push(c.checked));
localStorage.setItem("toggles",JSON.stringify(arr));
}

// load
window.onload=function(){
let t=JSON.parse(localStorage.getItem("toggles"));
if(t){
document.querySelectorAll("input[type=checkbox]").forEach((c,i)=>c.checked=t[i]);
}
let d=localStorage.getItem("dpi");
if(d){
document.getElementById("dpiValue").innerText=d;
}
}
</script>

</body>
</html>
